<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asistente de Soporte Técnico</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
    }

    .chat-container {
      width: 90%;
      max-width: 800px;
      margin: 30px auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .chat-header {
      background: #2563eb;
      color: white;
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
    }

    .chat-box {
      height: 500px;
      overflow-y: auto;
      padding: 20px;
      background: #fafafa;
    }

    .message {
      margin-bottom: 14px;
      padding: 12px 14px;
      border-radius: 10px;
      max-width: 80%;
      line-height: 1.5;
      white-space: pre-line;
    }

    .user {
      background: #dbeafe;
      margin-left: auto;
      text-align: right;
    }

    .bot {
      background: #e5e7eb;
      margin-right: auto;
    }

    .chat-input {
      display: flex;
      border-top: 1px solid #ddd;
    }

    .chat-input input {
      flex: 1;
      padding: 14px;
      border: none;
      font-size: 16px;
      outline: none;
    }

    .chat-input button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 0 24px;
      cursor: pointer;
      font-size: 16px;
    }

    .chat-input button:hover {
      background: #1d4ed8;
    }

    .meta {
      font-size: 12px;
      color: #555;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">Asistente Virtual de Soporte Técnico</div>
    <div class="chat-box" id="chatBox">
      <div class="message bot">
        Hola, soy tu asistente virtual de soporte técnico. Cuéntame qué problema tienes.
      </div>
    </div>
    <div class="chat-input">
      <input type="text" id="questionInput" placeholder="Escribe tu consulta..." />
      <button onclick="sendMessage()">Enviar</button>
    </div>
  </div>

  <script>
    async function sendMessage() {
      const input = document.getElementById("questionInput");
      const chatBox = document.getElementById("chatBox");
      const question = input.value.trim();

      if (!question) return;

      const userMessage = document.createElement("div");
      userMessage.className = "message user";
      userMessage.textContent = question;
      chatBox.appendChild(userMessage);

      input.value = "";

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ question })
        });

        const data = await response.json();

        let botText = data.answer;

        if (data.steps && data.steps.length > 0) {
          botText += "\n\nPasos recomendados:";
          data.steps.forEach((step, index) => {
            botText += `\n${index + 1}. ${step}`;
          });
        }

        if (data.recommendations && data.recommendations.length > 0) {
          botText += "\n\nRecomendaciones personalizadas:";
          data.recommendations.forEach((rec, index) => {
            botText += `\n- ${rec}`;
          });
        }

        botText += `\n\nConfianza del modelo: ${Number(data.confidence * 100).toFixed(1)}%`;

        const botMessage = document.createElement("div");
        botMessage.className = "message bot";
        botMessage.textContent = botText;
        chatBox.appendChild(botMessage);

      } catch (error) {
        const errorMessage = document.createElement("div");
        errorMessage.className = "message bot";
        errorMessage.textContent = "Ha ocurrido un error al conectar con el asistente.";
        chatBox.appendChild(errorMessage);
      }

      chatBox.scrollTop = chatBox.scrollHeight;
    }

    document.getElementById("questionInput").addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>
</html>
